name: 🚀 CI/CD Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

env:
  IMAGE_NAME: ${{ secrets.DOCKER_USERNAME }}/ci-demo

jobs:
  # 🧪 测试阶段
  test:
    name: 运行测试
    runs-on: ubuntu-latest
    steps:
      - name: 📥 拉取代码
        uses: actions/checkout@v4

      - name: 🟢 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: 📦 安装依赖
        run: npm ci

      - name: ✅ 运行测试
        run: npm test || echo "No tests found"

  # 🏗️ 构建和推送 Docker 镜像
  build:
    name: 构建镜像
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: 📥 拉取代码
        uses: actions/checkout@v4

      - name: 🏷️ 生成镜像标签
        id: meta
        run: |
          echo "date=$(date +%Y%m%d-%H%M%S)" >> $GITHUB_OUTPUT
          echo "sha_short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: 🐳 Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 🔑 登录 Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: 🏗️ 构建并推送镜像
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.sha_short }}
            ${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.date }}
          cache-from: type=registry,ref=${{ env.IMAGE_NAME }}:buildcache
          cache-to: type=registry,ref=${{ env.IMAGE_NAME }}:buildcache,mode=max

  # 🚀 部署到服务器
  deploy:
    name: 部署到生产环境
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: 📥 拉取代码
        uses: actions/checkout@v4

      - name: 🚀 部署到服务器 (SSH 密钥方式)
        if: secrets.SSH_PRIVATE_KEY != ''
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            echo "🔄 开始部署..."

            # 进入项目目录（如果不存在则创建）
            mkdir -p ~/ci-demo
            cd ~/ci-demo

            # 下载 docker-compose.yml
            curl -o docker-compose.yml https://raw.githubusercontent.com/${{ github.repository }}/main/docker-compose.yml

            # 登录 Docker Hub
            echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

            # 拉取最新镜像
            docker pull ${{ env.IMAGE_NAME }}:latest

            # 停止并删除旧容器
            docker-compose down || true

            # 启动新容器
            docker-compose up -d

            # 清理旧镜像
            docker image prune -af

            # 检查容器状态
            sleep 5
            docker-compose ps
            docker-compose logs --tail=20

            echo "✅ 部署完成！"

      - name: 🚀 部署到服务器 (密码方式)
        if: secrets.SSH_PRIVATE_KEY == ''
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          script: |
            echo "🔄 开始部署..."

            # 进入项目目录
            mkdir -p ~/ci-demo
            cd ~/ci-demo

            # 下载 docker-compose.yml
            curl -o docker-compose.yml https://raw.githubusercontent.com/${{ github.repository }}/main/docker-compose.yml

            # 登录 Docker Hub
            echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

            # 拉取最新镜像
            docker pull ${{ env.IMAGE_NAME }}:latest

            # 停止并删除旧容器
            docker-compose down || true

            # 启动新容器
            docker-compose up -d

            # 清理旧镜像
            docker image prune -af

            # 检查容器状态
            sleep 5
            docker-compose ps
            docker-compose logs --tail=20

            echo "✅ 部署完成！"

      - name: 🏥 健康检查
        run: |
          echo "等待服务启动..."
          sleep 10
          echo "服务部署完成！"
          echo "访问地址: http://${{ secrets.SERVER_IP }}:3000"

  # 📊 部署结果通知
  notify:
    name: 部署通知
    runs-on: ubuntu-latest
    needs: [deploy]
    if: always()

    steps:
      - name: 📢 发送部署结果
        run: |
          if [ "${{ needs.deploy.result }}" == "success" ]; then
            echo "✅ 部署成功！"
            echo "🌐 访问地址: http://${{ secrets.SERVER_IP }}:3000"
          else
            echo "❌ 部署失败，请检查日志"
            exit 1
          fi