name: 🚀 CI/CD Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

env:
  IMAGE_NAME: ${{ secrets.DOCKER_USERNAME }}/ci-demo

jobs:
  # 🧪 测试阶段
  test:
    name: 运行测试
    runs-on: ubuntu-latest
    steps:
      - name: 📥 拉取代码
        uses: actions/checkout@v4

      - name: 🟢 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: 📦 安装依赖
        run: npm ci

      - name: ✅ 运行测试
        run: npm test || echo "No tests found"

  # 🏗️ 构建和推送 Docker 镜像
  build:
    name: 构建镜像
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: 📥 拉取代码
        uses: actions/checkout@v4

      - name: 🏷️ 生成镜像标签
        id: meta
        run: |
          echo "date=$(date +%Y%m%d-%H%M%S)" >> $GITHUB_OUTPUT
          echo "sha_short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: 🐳 Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 🔑 登录 Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: 🏗️ 构建并推送镜像
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.sha_short }}
            ${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.date }}
          cache-from: type=registry,ref=${{ env.IMAGE_NAME }}:buildcache
          cache-to: type=registry,ref=${{ env.IMAGE_NAME }}:buildcache,mode=max

  # 🚀 部署到服务器
  deploy:
    name: 部署到生产环境
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 15

    steps:
      - name: 📥 拉取代码
        uses: actions/checkout@v4

      - name: 📤 传输 docker-compose.yml
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "docker-compose.yml"
          target: "~/ci-demo"
          timeout: 30s

      - name: 🚀 部署到服务器
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          timeout: 10m
          command_timeout: 15m
          script: |
            set -e  # 遇到错误立即退出

            echo "🔄 开始部署..."

            # 进入项目目录
            cd ~/ci-demo || exit 1

            # 定义重试函数
            retry_command() {
              local max_attempts=3
              local timeout=300
              local attempt=1
              local cmd="$@"

              while [ $attempt -le $max_attempts ]; do
                echo "尝试 $attempt/$max_attempts: $cmd"
                if timeout $timeout $cmd; then
                  return 0
                fi
                echo "⚠️  失败，等待10秒后重试..."
                sleep 10
                attempt=$((attempt + 1))
              done

              echo "❌ 命令失败: $cmd"
              return 1
            }

            # 配置Docker镜像加速（如果需要）
            if [ ! -f /etc/docker/daemon.json ] || ! grep -q "registry-mirrors" /etc/docker/daemon.json; then
              echo "📝 配置Docker镜像加速..."
              sudo mkdir -p /etc/docker
              sudo tee /etc/docker/daemon.json > /dev/null <<EOF
            {
              "registry-mirrors": [
                "https://0vmzj3q6.mirror.aliyuncs.com",
                "https://docker.m.daocloud.io",
                "https://mirror.baidubce.com",
                "https://dockerproxy.com",
                "https://mirror.iscas.ac.cn",
                "https://huecker.io",
                "https://dockerhub.timeweb.cloud",
                "https://noohub.ru",
                "https://vlgh0kqj.mirror.aliyuncs.com",
              ],
              "max-concurrent-downloads": 10
            }
            EOF
              sudo systemctl daemon-reload || true
              sudo systemctl restart docker || true
              sleep 5
            fi

            # 登录 Docker Hub（带重试）
            echo "🔑 登录 Docker Hub..."
            echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

            # 保存旧镜像ID用于回滚
            OLD_IMAGE_ID=$(docker images -q ${{ env.IMAGE_NAME }}:latest 2>/dev/null || echo "")
            echo "📦 旧镜像ID: ${OLD_IMAGE_ID:-无}"

            # 拉取最新镜像（带重试和超时）
            echo "📥 拉取最新镜像..."
            retry_command docker pull ${{ env.IMAGE_NAME }}:latest

            # 检查镜像是否成功拉取
            if ! docker images ${{ env.IMAGE_NAME }}:latest | grep -q latest; then
              echo "❌ 镜像拉取失败"
              exit 1
            fi

            NEW_IMAGE_ID=$(docker images -q ${{ env.IMAGE_NAME }}:latest)
            echo "✅ 新镜像ID: $NEW_IMAGE_ID"

            # 检查是否使用 docker-compose 或 docker compose
            if command -v docker-compose &> /dev/null; then
              COMPOSE_CMD="docker-compose"
            elif docker compose version &> /dev/null; then
              COMPOSE_CMD="docker compose"
            else
              echo "❌ docker compose 未安装"
              echo "正在安装 docker compose..."
              sudo curl -L "https://github.com/docker/compose/releases/latest/download/docker-compose-$(uname -s)-$(uname -m)" -o /usr/local/bin/docker-compose
              sudo chmod +x /usr/local/bin/docker-compose
              COMPOSE_CMD="docker-compose"
            fi

            echo "使用命令: $COMPOSE_CMD"

            # 备份当前运行的容器（用于回滚）
            BACKUP_CONTAINER=$(docker ps -q -f name=ci-demo-app)

            # 停止旧容器但不删除（保留用于回滚）
            echo "🛑 停止旧容器..."
            $COMPOSE_CMD down --remove-orphans || true

            # 启动新容器
            echo "🚀 启动新容器..."
            if ! $COMPOSE_CMD up -d; then
              echo "❌ 启动失败，尝试回滚..."
              if [ -n "$BACKUP_CONTAINER" ]; then
                docker start $BACKUP_CONTAINER || true
              fi
              exit 1
            fi

            # 等待容器启动
            echo "⏳ 等待容器启动..."
            sleep 10

            # 健康检查（最多等待60秒）
            echo "🏥 执行健康检查..."
            MAX_WAIT=60
            ELAPSED=0
            HEALTH_CHECK_PASSED=false

            while [ $ELAPSED -lt $MAX_WAIT ]; do
              if docker ps | grep -q ci-demo-app && docker inspect --format='{{.State.Health.Status}}' ci-demo-app 2>/dev/null | grep -q "healthy"; then
                echo "✅ 健康检查通过"
                HEALTH_CHECK_PASSED=true
                break
              elif docker ps | grep -q ci-demo-app; then
                # 如果没有健康检查配置，检查容器是否运行
                if curl -f http://localhost:3000 >/dev/null 2>&1; then
                  echo "✅ 服务响应正常"
                  HEALTH_CHECK_PASSED=true
                  break
                fi
              fi
              echo "等待健康检查... ($ELAPSED/$MAX_WAIT 秒)"
              sleep 5
              ELAPSED=$((ELAPSED + 5))
            done

            if [ "$HEALTH_CHECK_PASSED" = false ]; then
              echo "❌ 健康检查失败，回滚部署..."
              $COMPOSE_CMD logs --tail=50
              $COMPOSE_CMD down || true

              # 回滚到旧版本
              if [ -n "$OLD_IMAGE_ID" ] && [ "$OLD_IMAGE_ID" != "$NEW_IMAGE_ID" ]; then
                echo "🔄 回滚到旧版本..."
                docker tag $OLD_IMAGE_ID ${{ env.IMAGE_NAME }}:latest || true
                $COMPOSE_CMD up -d || true
              fi
              exit 1
            fi

            # 清理旧镜像（保留最新的2个版本）
            echo "🧹 清理旧镜像..."
            docker images ${{ env.IMAGE_NAME }} --format "{{.ID}}" | tail -n +3 | xargs -r docker rmi -f || true
            docker image prune -f || true

            # 显示容器状态
            echo "📊 容器状态:"
            $COMPOSE_CMD ps
            echo ""
            echo "📝 最近日志:"
            $COMPOSE_CMD logs --tail=30

            echo "✅ 部署完成！"

      - name: 🏥 健康检查
        run: |
          echo "⏳ 等待服务完全就绪..."
          sleep 5

          MAX_ATTEMPTS=6
          ATTEMPT=1

          while [ $ATTEMPT -le $MAX_ATTEMPTS ]; do
            echo "健康检查 $ATTEMPT/$MAX_ATTEMPTS..."

            if curl -f -m 10 http://${{ secrets.SERVER_IP }}:3000 >/dev/null 2>&1; then
              echo "✅ 服务健康检查通过！"
              echo "🌐 访问地址: http://${{ secrets.SERVER_IP }}:3000"
              exit 0
            fi

            echo "⚠️  服务未就绪，等待10秒..."
            sleep 10
            ATTEMPT=$((ATTEMPT + 1))
          done

          echo "❌ 健康检查失败"
          exit 1

  # 📊 部署结果通知
  notify:
    name: 部署通知
    runs-on: ubuntu-latest
    needs: [deploy]
    if: always()

    steps:
      - name: 📢 发送部署结果
        run: |
          if [ "${{ needs.deploy.result }}" == "success" ]; then
            echo "✅ 部署成功！"
            echo "🌐 访问地址: http://${{ secrets.SERVER_IP }}:3000"
          else
            echo "❌ 部署失败，请检查日志"
            exit 1
          fi